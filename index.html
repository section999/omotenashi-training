<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/favicon-32x32.png" />
  <title>Omotenashi Training — Japanese Hospitality Mastery</title>
  <meta name="description" content="Master Japanese hospitality with interactive lessons, vocabulary drills, and role-play simulations. Learn keigo, omotenashi, and hotel service skills." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Omotenashi Training — Japanese Hospitality Mastery" />
  <meta property="og:description" content="Master Japanese hospitality with interactive lessons, vocabulary drills, and role-play simulations." />
  <meta property="og:image" content="https://cdn.freecodecamp.org/platform/universal/fcc_meta_1920X1080-indigo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Omotenashi Training — Japanese Hospitality Mastery" />
  <meta name="twitter:description" content="Master Japanese hospitality with interactive lessons, vocabulary drills, and role-play simulations." />
  <meta name="twitter:image" content="https://cdn.freecodecamp.org/platform/universal/fcc_meta_1920X1080-indigo.png" />
  <style>
    /* ── TOKENS ─────────────────────────────────── */
    :root {
      --bg-primary:    #0a0a23;
      --bg-secondary:  #1b1b32;
      --bg-tertiary:   #2a2a4a;
      --bg-surface:    #0d0d1a;
      --accent-yellow: #f1be32;
      --accent-blue:   #198eee;
      --accent-green:  #1fad69;
      --accent-red:    #c5442a;
      --accent-purple: #9b59b6;
      --text-primary:   #ffffff;
      --text-secondary: #a3a3c2;
      --text-muted:     #5f5f7a;
      --text-inverse:   #0a0a23;
      --border-default: #2a2a4a;
      --border-strong:  #4a4a6a;
      --font-sans: 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      --transition: 150ms ease;
      --transition-slow: 400ms ease;
    }

    /* ── LIGHT MODE ─────────────────────────────── */
    [data-theme="light"] {
      --bg-primary:    #ffffff;
      --bg-secondary:  #ffffff;
      --bg-tertiary:   #ffffff;
      --bg-surface:    #ffffff;
      --text-primary:   #1b1b32;
      --text-secondary: #46465e;
      --text-muted:     #78788a;
      --text-inverse:   #ffffff;
      --border-default: #c8c9cc;
      --border-strong:  #8e8e9a;
      --accent-yellow:  #f1be32;
      --accent-blue:    #0096db;
      --accent-green:   #71b771;
      --accent-red:     #e47777;
      --accent-purple:  #9b59b6;
    }
    [data-theme="light"] .nav { background: #0a0a23 !important; }
    [data-theme="light"] .nav * { color: #ffffff !important; border-color: transparent !important; }
    [data-theme="light"] .nav-dropdown { background: #1b1b32 !important; border-color: #3b3b5c !important; }
    [data-theme="light"] .nav-dropdown a:hover { background: rgba(255,255,255,0.08) !important; }
    [data-theme="light"] .kanji-char { color: rgba(27,27,50,0.05); }
    [data-theme="light"] .hero-bg {
      background: linear-gradient(to bottom, #f5f6f7 70%, #ffffff 100%);
    }
    [data-theme="light"] .stats-bar {
      background: #f5f6f7;
      border-top: none;
      border-bottom: none;
    }
    [data-theme="light"] .philosophy {
      background: #ffffff;
      border-top: none;
      border-bottom: none;
    }
    [data-theme="light"] .btn-cta { color: #0d0d1a; }
    [data-theme="light"] .hero-title .highlight {
      background: none;
      -webkit-text-fill-color: #1b1b32;
      color: #1b1b32;
    }

    /* ── RESET ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    :focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 3px; }
    ::selection { background: var(--accent-blue); color: #fff; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    /* ── NAV ─────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 60px;
      background: #0a0a23;
      backdrop-filter: blur(16px);
      transition: border-color var(--transition-slow);
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }
    .nav-brand {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 700;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 10px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
    .nav-brand .prompt { opacity: 0.5; }
    .nav-brand .jp { font-size: 0.75rem; color: var(--text-muted); margin-left: 4px; }
    .nav-links {
      display: flex;
      gap: 4px;
      list-style: none;
    }
    .nav-links a {
      display: block;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    .nav-links a:hover { color: #ffffff; background: rgba(255,255,255,0.1); }
    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 700;
      background: var(--accent-yellow);
      color: var(--text-inverse);
      text-decoration: none;
      border-radius: 6px;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    .nav-cta:hover {
      background: #e6b020;
      box-shadow: 0 0 0 3px rgba(241,190,50,.25);
      transform: translateY(-1px);
    }

    /* ── HERO ─────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-top: 60px;
    }

    /* Animated gradient mesh — warm crimson/gold Japanese palette */
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 40%, rgba(180,30,45,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 20% 70%, rgba(241,190,50,0.09) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 85% 85%, rgba(180,30,45,0.08) 0%, transparent 50%),
        linear-gradient(to bottom, #1b1b32 0%, #1b1b32 50%, #0a0a23 100%);
      animation: bgPulse 10s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0%   { opacity: 1; }
      100% { opacity: 0.85; }
    }

    .hero-grid { display: none; }

    /* Floating kanji */
    .kanji-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .kanji-char {
      position: absolute;
      font-family: 'Yu Gothic', 'MS Gothic', serif;
      color: rgba(241,190,50,0.055);
      font-size: clamp(60px, 8vw, 120px);
      user-select: none;
      animation: kanjiFloat linear infinite;
    }
    @keyframes kanjiFloat {
      0%   { transform: translateY(0) rotate(0deg);   opacity: 0.03; }
      50%  { opacity: 0.07; }
      100% { transform: translateY(-60px) rotate(3deg); opacity: 0.03; }
    }


    /* Sakura petals */
    .sakura-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .petal {
      position: absolute;
      top: -40px;
      width: 10px;
      height: 10px;
      background: radial-gradient(ellipse 60% 80% at 50% 30%, rgba(255,182,193,0.85), rgba(220,80,100,0.4));
      border-radius: 150% 0 150% 0;
      opacity: 0;
      animation: petalFall linear infinite;
    }
    @keyframes petalFall {
      0%   { transform: translateY(-20px) rotate(0deg)   translateX(0);   opacity: 0; }
      10%  { opacity: 0.7; }
      85%  { opacity: 0.5; }
      100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
    }

    .hero-content {
      position: relative;
      z-index: 10;
      width: 100%;
      padding: 0 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-yellow);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-eyebrow::before { display: none; }

    .hero-title {
      font-family: var(--font-mono);
      font-size: clamp(4rem, 7vw, 7rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 72px;
      white-space: nowrap;
    }
    .hero-title .highlight {
      background: none;
      -webkit-text-fill-color: #ffffff;
      color: #ffffff;
    }

    .hero-subtitle {
      font-family: var(--font-mono);
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      color: var(--text-muted);
      margin-bottom: 48px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .hero-subtitle .jp {
      color: var(--text-secondary);
    }

    .hero-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.75;
      text-align: center;
      margin-bottom: 40px;
      max-width: 480px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-hero-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 700;
      background: var(--accent-yellow);
      color: var(--text-inverse);
      text-decoration: none;
      border-radius: 8px;
      border: 2px solid var(--accent-yellow);
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    .btn-hero-primary:hover {
      background: #e6b020;
      border-color: #e6b020;
      box-shadow: 0 0 0 4px rgba(241,190,50,.2), 0 8px 24px rgba(241,190,50,.15);
      transform: translateY(-2px);
    }

    .btn-hero-secondary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 600;
      background: transparent;
      color: var(--accent-blue);
      text-decoration: none;
      border-radius: 8px;
      border: 2px solid var(--accent-blue);
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    .btn-hero-secondary:hover {
      background: rgba(25,142,238,0.08);
      box-shadow: 0 0 0 4px rgba(25,142,238,.15);
      transform: translateY(-2px);
    }

    /* Hero right panel — decorative terminal card */
    .hero-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
      animation: cardFloat 6s ease-in-out infinite;
    }
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    .hero-card-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-default);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green  { background: #28ca41; }
    .hero-card-title {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 8px;
    }
    .hero-card-body { padding: 28px; }

    .terminal-line {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.8;
      display: flex;
      gap: 10px;
    }
    .terminal-line .prompt-sym { color: var(--accent-green); }
    .terminal-line .cmd        { color: var(--text-primary); }
    .terminal-line .out        { color: var(--text-secondary); }
    .terminal-line .accent     { color: var(--accent-yellow); }
    .terminal-line .blue       { color: var(--accent-blue); }
    .terminal-line .purple     { color: var(--accent-purple); }
    .terminal-line .green      { color: var(--accent-green); }
    .terminal-line .muted      { color: var(--text-muted); }
    .terminal-line.gap         { margin-top: 8px; }
    .terminal-line.indent      { padding-left: 22px; }
    .cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--accent-yellow);
      border-radius: 1px;
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── STATS BAR ────────────────────────────────── */
    .stats-bar {
      background: var(--bg-secondary);
      border-top: none;
      border-bottom: none;
    }
    .stats-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      divide: var(--border-default);
    }
    .stat-item {
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-right: 1px solid var(--border-default);
    }
    .stat-item:last-child { border-right: none; }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent-yellow);
      line-height: 1;
    }
    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── SECTION COMMON ──────────────────────────── */
    .section {
      padding: 96px 0;
    }
    .section-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
    }
    .section-label {
      font-family: var(--font-mono);
      font-size: 1rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-yellow);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::before { display: none; }
    .section-title {
      font-family: var(--font-mono);
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }
    .section-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.75;
      max-width: 580px;
      margin-bottom: 56px;
    }

    /* ── MODULES ─────────────────────────────────── */
    .modules-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 1136px;
      margin: 0 auto;
    }
    .module-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      padding: 28px;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition-slow), transform var(--transition-slow), box-shadow var(--transition-slow);
      cursor: default;
    }
    .module-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--card-accent, var(--accent-yellow));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .module-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
    }
    .module-card:hover::before { transform: scaleX(1); }

    .module-card.m1 { --card-accent: var(--accent-yellow); }
    .module-card.m2 { --card-accent: var(--accent-blue); }
    .module-card.m3 { --card-accent: var(--accent-red); }
    .module-card.m4 { --card-accent: var(--accent-green); }
    .module-card.m5 { --card-accent: var(--accent-purple); }
    .module-card.m-wide { grid-column: span 2; }

    .module-num {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--card-accent, var(--accent-yellow));
      margin-bottom: 12px;
      opacity: 0.8;
    }
    .module-kanji {
      font-family: 'Yu Gothic', 'MS Gothic', serif;
      font-size: 2.8rem;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 12px;
      opacity: 0.15;
      position: absolute;
      top: 20px; right: 24px;
      color: var(--card-accent, var(--accent-yellow));
      transition: opacity var(--transition-slow);
    }
    .module-card:hover .module-kanji { opacity: 0.28; }

    .module-title {
      font-family: var(--font-mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .module-subtitle {
      font-size: 0.78rem;
      color: var(--card-accent, var(--accent-yellow));
      margin-bottom: 14px;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }
    .module-desc {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .module-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tag {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--bg-tertiary);
      color: var(--text-muted);
      border: 1px solid var(--border-default);
      letter-spacing: 0.04em;
    }

    /* ── PHILOSOPHY ───────────────────────────────── */
    .philosophy {
      background: var(--bg-primary);
      border-top: none;
      border-bottom: none;
      margin-top: 80px;
    }
    .philosophy-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .philosophy-quote {
      position: relative;
      padding: 40px;
      background: var(--bg-secondary);
      border-radius: 16px;
      border: 1px solid var(--border-default);
    }
    .philosophy-quote::before {
      content: '"';
      position: absolute;
      top: -20px; left: 32px;
      font-size: 5rem;
      color: var(--accent-yellow);
      font-family: serif;
      line-height: 1;
      opacity: 0.4;
    }
    .philosophy-jp {
      font-family: 'Yu Gothic', 'MS Gothic', serif;
      font-size: 2.6rem;
      color: var(--text-primary);
      margin-bottom: 16px;
      letter-spacing: 0.1em;
    }
    .philosophy-romaji {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--accent-yellow);
      letter-spacing: 0.12em;
      margin-bottom: 12px;
    }
    .philosophy-meaning {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .pillar-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .pillar-item {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .pillar-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      border: 1px solid;
    }
    .pillar-icon.yellow { background: rgba(241,190,50,.1); border-color: rgba(241,190,50,.3); }
    .pillar-icon.blue   { background: rgba(25,142,238,.1); border-color: rgba(25,142,238,.3); }
    .pillar-icon.green  { background: rgba(31,173,105,.1); border-color: rgba(31,173,105,.3); }
    .pillar-icon.purple { background: rgba(155,89,182,.1); border-color: rgba(155,89,182,.3); }
    .pillar-text-title {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    .pillar-text-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ── OUTCOMES ─────────────────────────────────── */
    .outcomes-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .outcome-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 20px 22px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-default);
      border-radius: 10px;
      transition: border-color var(--transition);
    }
    .outcome-item:hover { border-color: var(--border-strong); }
    .outcome-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(31,173,105,.15);
      border: 1px solid rgba(31,173,105,.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--accent-green);
      flex-shrink: 0;
      margin-top: 2px;
    }
    .outcome-text {
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .outcome-text strong { color: var(--text-primary); }

    /* ── CTA ─────────────────────────────────────── */
    .cta-section {
      position: relative;
      overflow: hidden;
      padding: 120px 0;
    }
    .cta-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 80% at 50% 50%, rgba(241,190,50,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 10% 90%, rgba(25,142,238,0.06) 0%, transparent 60%);
    }
    .cta-inner {
      position: relative;
      max-width: 700px;
      margin: 0 auto;
      padding: 0 32px;
      text-align: center;
    }
    .cta-eyebrow {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-yellow);
      margin-bottom: 20px;
      opacity: 0.8;
    }
    .cta-title {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
    }
    .cta-title .jp-large {
      font-family: 'Yu Gothic', 'MS Gothic', serif;
      color: var(--accent-yellow);
      display: block;
      font-size: 0.7em;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      opacity: 0.6;
    }
    .cta-desc {
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 1.75;
      margin-bottom: 40px;
    }
    .cta-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .btn-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 20px 48px;
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 700;
      background: var(--accent-yellow);
      color: var(--text-inverse);
      text-decoration: none;
      border-radius: 8px;
      border: 2px solid var(--accent-yellow);
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    .btn-cta:hover {
      background: #e6b020;
      border-color: #e6b020;
      box-shadow: 0 0 0 5px rgba(241,190,50,.2), 0 12px 32px rgba(241,190,50,.2);
      transform: translateY(-2px);
    }

    /* ── SCROLL TO TOP ───────────────────────────── */
    .scroll-top {
      width: 36px; height: 36px; background: transparent;
      border: none; border-radius: 4px;
      color: #ffffff; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      transition: opacity 0.2s; opacity: 0.7;
    }
    .scroll-top:hover { opacity: 1; }
    .footer-inner .scroll-top { position: absolute; right: 0; }


    /* ── FOOTER ──────────────────────────────────── */
    .footer {
      border-top: none;
      padding: 18px 0; margin-top: 0;
      background: #0a0a23;
    }
    .footer-inner { display: flex; align-items: center; justify-content: center; position: relative; }
    .footer-brand { font-family: var(--font-mono); font-size: 1rem; color: #ffffff; }

    .logo-small { display: none; }
    .btn-line2 { display: none; }
    .btn-line1::after { content: " (It's free)"; }

    /* ── MOBILE HERO ── */
    @media (max-width: 640px) {
      .hero-title {
        font-size: clamp(2.8rem, 10vw, 4rem);
        white-space: normal;
      }
      .hero-subtitle {
        font-size: clamp(1.3rem, 5vw, 1.8rem);
        white-space: normal;
      }
      .btn-cta {
        font-size: 1.2rem;
        padding: 16px 32px;
        flex-direction: column;
        gap: 2px;
      }
      .btn-line1::after { display: none; }
      .btn-line2 { display: block; font-size: 0.85rem; opacity: 0.8; }
      .hero-content { padding: 0 20px; }
    }

    /* ── MOBILE NAV ── */
    @media (max-width: 640px) {
      .nav-inner { padding: 0 16px; }
      .logo-large { display: none !important; }
      .logo-small { display: block !important; }
      .nav-search input { display: none; }
      .nav-search { padding: 6px 10px; }
    }

    /* ── ANIMATIONS ───────────────────────────────── */
    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fade-in:nth-child(1) { transition-delay: 0ms; }
    .fade-in:nth-child(2) { transition-delay: 80ms; }
    .fade-in:nth-child(3) { transition-delay: 160ms; }
    .fade-in:nth-child(4) { transition-delay: 240ms; }
    .fade-in:nth-child(5) { transition-delay: 320ms; }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 900px) {
      .hero-card { max-width: 520px; }
      .modules-grid { grid-template-columns: 1fr 1fr; }
      .module-card.m-wide { grid-column: span 2; }
      .philosophy-grid { grid-template-columns: 1fr; gap: 48px; }
      .outcomes-grid { grid-template-columns: 1fr; }
      .stats-inner { grid-template-columns: repeat(2, 1fr); }
      .stat-item:nth-child(2) { border-right: none; }
    }
    @media (max-width: 600px) {
      .nav-links { display: none; }
      .modules-grid { grid-template-columns: 1fr; }
      .module-card.m-wide { grid-column: span 1; }
      .stats-inner { grid-template-columns: repeat(2, 1fr); }
      .hero-content { padding: 0 20px; }
      .section-inner { padding: 0 20px; }
      .footer-inner { padding: 0 20px; flex-direction: column; text-align: center; }
      .footer { padding: 10px 0; }
      .footer-brand { font-size: 0.75rem; }
    }
  </style>
  <link rel="stylesheet" href="assets/nav.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-search-wrap">
        <div class="nav-search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="navSearchInput" name="navSearch" placeholder="Search phrases..." autocomplete="off" />
        </div>
        <div id="navSearchDrop" class="nav-search-drop"></div>
      </div>
      <a href="https://www.freecodecamp.org/" target="_blank" rel="noopener" aria-label="freeCodeCamp" style="position:absolute;left:50%;transform:translateX(-50%);display:flex;align-items:center;opacity:1;">
        <img class="logo-large" src="assets/fcc_primary_large.png" alt="freeCodeCamp" style="height:28px;width:auto;filter:brightness(0) invert(1);" onerror="this.style.display='none'" />
        <img class="logo-small" src="assets/fcc_primary_small.png" alt="freeCodeCamp" style="height:28px;width:auto;filter:brightness(0) invert(1);" onerror="this.style.display='none'" />
      </a>
      <div style="display:flex;align-items:center;gap:16px;margin-left:auto;">
        <div class="nav-menu-wrap">
          <button class="nav-menu-btn" aria-label="Open menu" onclick="this.nextElementSibling.classList.toggle('open')">
            <span></span><span></span><span></span>
          </button>
          <div class="nav-dropdown">
            <a href="index.html">Main</a>
            <a href="curriculum.html">Curriculum</a>
            <a href="#" onclick="toggleMode();return false;">Switch Mode</a>
            <a href="https://www.freecodecamp.org/donate/" target="_blank" rel="noopener">Donate</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>
    <div class="sakura-bg" id="sakuraBg" aria-hidden="true"></div>
    <div class="kanji-bg" aria-hidden="true">
      <span class="kanji-char" style="top:12%;left:8%;animation-duration:9s;animation-delay:-2s;">礼</span>
      <span class="kanji-char" style="top:60%;left:5%;animation-duration:12s;animation-delay:-5s;font-size:80px;">和</span>
      <span class="kanji-char" style="top:30%;left:50%;animation-duration:11s;animation-delay:-1s;font-size:100px;">敬</span>
      <span class="kanji-char" style="top:70%;left:80%;animation-duration:8s;animation-delay:-4s;">誠</span>
      <span class="kanji-char" style="top:10%;left:88%;animation-duration:14s;animation-delay:-7s;font-size:90px;">心</span>
      <span class="kanji-char" style="top:85%;left:40%;animation-duration:10s;animation-delay:-3s;font-size:75px;">道</span>
    </div>

    <div class="hero-content">
      <div class="hero-text">
        <h1 class="hero-title">
          <span class="highlight">Omotenashi Training</span>
        </h1>
        <p class="hero-subtitle">
          The spirit of Japanese Hospitality
        </p>
        <a class="btn-cta" href="curriculum.html" style="margin-top:16px;">
          <span class="btn-line1">Get Started</span><span class="btn-line2">(It's free)</span>
        </a>
      </div>

    </div>
  </section>






  <!-- FOOTER -->
  <footer class="footer">
    <div style="max-width:1300px; margin:0 auto; padding:0 32px;">
      <div class="footer-inner">
        <a href="index.html" class="footer-brand" style="text-decoration:none;">Omotenashi Training</a>
        <button class="scroll-top" id="scrollTop" aria-label="Back to top">↑</button>
      </div>
    </div>
  </footer>

  <script>
    // Dark / Light mode toggle
    function toggleMode() {
      const html = document.documentElement;
      const isLight = html.getAttribute('data-theme') === 'light';
      html.setAttribute('data-theme', isLight ? 'dark' : 'light');
      localStorage.setItem('theme', isLight ? 'dark' : 'light');
    }
    // Apply saved theme on load
    (function() {
      const saved = localStorage.getItem('theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();

    // Close menu on outside click
    document.addEventListener('click', e => {
      document.querySelectorAll('.nav-dropdown.open').forEach(d => {
        if (!d.parentElement.contains(e.target)) d.classList.remove('open');
      });
    });

    // Sakura petals
    (function() {
      const container = document.getElementById('sakuraBg');
      if (!container) return;
      const count = 18;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        const size = 7 + Math.random() * 8;
        p.style.cssText = `
          left: ${Math.random() * 100}%;
          width: ${size}px;
          height: ${size}px;
          animation-duration: ${8 + Math.random() * 12}s;
          animation-delay: ${-(Math.random() * 18)}s;
          transform: rotate(${Math.random() * 360}deg);
          opacity: 0;
        `;
        container.appendChild(p);
      }
    })();

    // Intersection Observer for scroll-in animations
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // Subtle nav border on scroll
    const nav = document.querySelector('.nav');
    window.addEventListener('scroll', () => {
      nav.style.borderBottomColor = window.scrollY > 40
        ? 'rgba(74,74,106,0.8)'
        : 'var(--border-default)';
    }, { passive: true });

    // Scroll to top
    document.getElementById('scrollTop')?.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
<script src="search.js"></script>
<script src="assets/nav.js"></script>
</body>
</html>
